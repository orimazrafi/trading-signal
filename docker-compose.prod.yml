# Production-style stack (built images, client on :8080).
# Run: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_signal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_signal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
      cache_from:
        - trading-signal-worker:latest
    image: trading-signal-worker:latest
    command: ["node", "dist/worker.js"]
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      RECOMMENDATIONS_ENABLED: "true"
      RECOMMENDATIONS_INTERVAL_MS: "300000"
      RECOMMENDATION_SYMBOLS: "AAPL,MSFT,TSLA,NVDA,GOOGL,AMZN,META,JPM,XOM"
      NEWS_INGEST_ENABLED: "true"
      NEWS_INGEST_INTERVAL_MS: "300000"
      NEWS_INGEST_SYMBOLS: "AAPL,MSFT,TSLA,NVDA,GOOGL"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
      cache_from:
        - trading-signal-server:latest
    image: trading-signal-server:latest
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: http://localhost:8080
      GOOGLE_CALLBACK_URL: http://localhost:8080/api/auth/google/callback
      AUTH_ALLOW_MOCK: "false"
      RECOMMENDATIONS_ENABLED: "true"
      RECOMMENDATION_SYMBOLS: "AAPL,MSFT,TSLA,NVDA,GOOGL,AMZN,META,JPM,XOM"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      worker:
        condition: service_started

  alerts-runner:
    build:
      context: ./alerts-runner
      dockerfile: Dockerfile
    image: trading-signal-alerts-runner:latest
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      ALERT_CHECK_INTERVAL_MS: "300000"
      STOCK_CACHE_TTL_SECONDS: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      server:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      cache_from:
        - trading-signal-client:latest
    image: trading-signal-client:latest
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_started
      worker:
        condition: service_started

volumes:
  postgres_data:
