services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_signal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_signal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
      cache_from:
        - trading-signal-server:latest
    image: trading-signal-server:latest
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: http://localhost:8080
      GOOGLE_CALLBACK_URL: http://localhost:8080/api/auth/google/callback
      AUTH_ALLOW_MOCK: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
      cache_from:
        - trading-signal-worker:latest
    image: trading-signal-worker:latest
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      cache_from:
        - trading-signal-client:latest
    image: trading-signal-client:latest
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
