name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test contracts
        run: npm run test -w @trading-signal/contracts

      - name: Test server
        run: npm run test -w server

      - name: Build monorepo
        run: npm run build

      - name: Test alerts-runner
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        working-directory: alerts-runner
        run: go test ./...
