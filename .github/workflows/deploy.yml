name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prefix=${REGISTRY}/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/server:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.prefix }}/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/client:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.prefix }}/client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ~/trading-signal
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            export IMAGE_TAG="${TAG}"
            export GHCR_IMAGE_PREFIX="${{ env.REGISTRY }}/${{ github.repository }}"
            docker compose --env-file .env.deploy -f docker-compose.deploy.yml pull
            docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --remove-orphans
            for attempt in $(seq 1 24); do
              if curl -fsS "https://${{ secrets.SITE_DOMAIN }}/health"; then
                exit 0
              fi
              echo "Health check attempt ${attempt}/24 failed; retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 2 minutes"
            exit 1
