services:
  server:
    build:
      target: dev
      cache_from:
        - trading-signal-server:dev
    image: trading-signal-server:dev
    command: ["sh", "-c", "npx prisma db push --accept-data-loss && npm run dev"]
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - ./server/tsconfig.json:/app/tsconfig.json
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: dev-jwt-secret-change-me
      JWT_EXPIRES_IN: 1h
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY}
      CLIENT_URL: http://localhost:5173
      GOOGLE_CALLBACK_URL: http://localhost:5173/api/auth/google/callback
      AUTH_ALLOW_MOCK: "false"

  worker:
    build:
      target: dev
      cache_from:
        - trading-signal-worker:dev
    image: trading-signal-worker:dev
    command: ["npm", "run", "dev:worker"]
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - ./server/tsconfig.json:/app/tsconfig.json
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_signal
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY}
      NEWS_INGEST_ENABLED: "true"
      NEWS_INGEST_INTERVAL_MS: "300000"
      NEWS_INGEST_SYMBOLS: "AAPL,MSFT,TSLA,NVDA,GOOGL"
    depends_on:
      - server

  client:
    build:
      target: dev
      cache_from:
        - trading-signal-client:dev
    image: trading-signal-client:dev
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
      - ./client/public:/app/public
    environment:
      API_PROXY_TARGET: http://server:3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    depends_on:
      - server
